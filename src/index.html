<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Java Todo App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --ink: #1A1A18;
    --muted: #888780;
    --accent: #1D9E75;
    --accent-light: #E1F5EE;
    --accent-dark: #0F6E56;
    --danger: #E24B4A;
    --border: rgba(0,0,0,0.09);
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1rem 6rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  header p {
    font-size: 14px;
    color: var(--muted);
    margin-top: 6px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px;
    background: #0C447C22;
    color: #0C447C;
    margin-top: 10px;
  }

  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
    width: 100%;
    max-width: 560px;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    text-align: center;
  }

  .stat .num {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--ink);
  }

  .stat .lbl {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .add-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 1.5rem;
  }

  .add-row input {
    flex: 1;
    padding: 12px 16px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  .add-row input:focus { border-color: var(--accent); }
  .add-row input::placeholder { color: var(--muted); }

  .add-row button {
    padding: 12px 20px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .add-row button:hover { background: #333; }
  .add-row button:active { transform: scale(0.97); }

  .filter-row {
    display: flex;
    gap: 6px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 1rem;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 999px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
  }

  .filter-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .task-list {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: opacity 0.2s, transform 0.15s;
    animation: slide-in 0.2s ease both;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task.done { opacity: 0.55; }

  .check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 12px;
    color: transparent;
  }

  .task.done .check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .task-text {
    flex: 1;
    font-size: 15px;
    color: var(--ink);
  }

  .task.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-time {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .del-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 6px;
    transition: color 0.12s, background 0.12s;
    line-height: 1;
  }

  .del-btn:hover { color: var(--danger); background: #FCEBEB; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 3rem 0;
  }

  .api-tag {
    font-size: 11px;
    font-family: monospace;
    color: var(--muted);
    background: var(--accent-light);
    color: var(--accent-dark);
    padding: 1px 7px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>Java Todo</h1>
  <p>Powered by Spring Boot &amp; H2 · REST API</p>
  <div class="badge">⚡ Running on localhost:8080</div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="num" id="s-total">0</div><div class="lbl">Total</div></div>
  <div class="stat"><div class="num" id="s-done">0</div><div class="lbl">Done</div></div>
  <div class="stat"><div class="num" id="s-pending">0</div><div class="lbl">Pending</div></div>
</div>

<div class="add-row">
  <input type="text" id="taskInput" placeholder="Add a new task..." />
  <button onclick="addTask()">Add</button>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
</div>

<div class="task-list" id="taskList"></div>

<script>
  const API = '/api/todos';
  let filter = 'all';

  async function load() {
    const [todos, stats] = await Promise.all([
      fetch(API).then(r => r.json()),
      fetch(API + '/stats').then(r => r.json())
    ]);
    document.getElementById('s-total').textContent = stats.total;
    document.getElementById('s-done').textContent = stats.done;
    document.getElementById('s-pending').textContent = stats.pending;
    render(todos);
  }

  function render(todos) {
    const list = document.getElementById('taskList');
    const filtered = todos.filter(t => {
      if (filter === 'done') return t.completed;
      if (filter === 'pending') return !t.completed;
      return true;
    });
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">No tasks here. Add one above!</div>';
      return;
    }
    list.innerHTML = filtered.map(t => `
      <div class="task ${t.completed ? 'done' : ''}" id="task-${t.id}">
        <button class="check" onclick="toggle(${t.id})">${t.completed ? '✓' : ''}</button>
        <span class="task-text">${escHtml(t.title)}</span>
        <span class="task-time">${fmtTime(t.createdAt)}</span>
        <button class="del-btn" onclick="remove(${t.id})">✕</button>
      </div>
    `).join('');
  }

  async function addTask() {
    const input = document.getElementById('taskInput');
    const title = input.value.trim();
    if (!title) return;
    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title })
    });
    input.value = '';
    load();
  }

  async function toggle(id) {
    await fetch(`${API}/${id}/toggle`, { method: 'PATCH' });
    load();
  }

  async function remove(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    load();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    load();
  }

  function fmtTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  load();
</script>
</body>
</html>
